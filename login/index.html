<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>霖久充电登录</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 400px;
      width: 90%;
    }

    .login-box {
      display: block;
    }

    .success-box {
      display: none;
      text-align: center;
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .code-group {
      display: flex;
      gap: 10px;
    }

    .code-group input {
      flex: 1;
    }

    .get-code-btn {
      padding: 12px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
      transition: all 0.3s;
    }

    .get-code-btn:hover:not(:disabled) {
      background: #5568d3;
      transform: translateY(-2px);
    }

    .get-code-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .login-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      color: #e74c3c;
      font-size: 13px;
      margin-top: 5px;
      display: none;
    }

    .success-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: #52c41a;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: scaleIn 0.5s ease-out;
    }

    .success-icon::after {
      content: "✓";
      color: white;
      font-size: 50px;
      font-weight: bold;
    }

    @keyframes scaleIn {
      0% {
        transform: scale(0);
      }

      50% {
        transform: scale(1.1);
      }

      100% {
        transform: scale(1);
      }
    }

    .success-text {
      color: #52c41a;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .user-info {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      text-align: left;
    }

    .user-info p {
      margin: 10px 0;
      color: #666;
      font-size: 14px;
    }

    .user-info strong {
      color: #333;
    }

    .logout-btn {
      margin-top: 20px;
      padding: 10px 30px;
      background: #f0f0f0;
      color: #666;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      background: #e0e0e0;
    }

    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #fff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* 菜单样式 */
    .menu-container {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
    }

    .menu-btn {
      background: rgba(255, 255, 255, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }

    .menu-btn:hover {
      background: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
    }

    .menu-btn svg {
      display: block;
    }

    .menu-dropdown {
      position: absolute;
      top: 55px;
      left: 0;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      width: 160px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      overflow: hidden;
    }

    .menu-dropdown.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .menu-item {
      display: block;
      padding: 12px 20px;
      color: #555;
      text-decoration: none;
      font-size: 14px;
      transition: background 0.2s;
      border-left: 3px solid transparent;
    }

    .menu-item:hover {
      background: #f8f9fa;
      color: #667eea;
      border-left-color: #667eea;
    }

    .menu-item.active {
      background: #667eea;
      color: white;
      border-left-color: #764ba2;
      font-weight: 600;
    }

    .menu-item.active:hover {
      background: #5568d3;
      color: white;
    }

    .menu-divider {
      height: 1px;
      background: #eee;
      margin: 4px 0;
    }
  </style>
</head>

<body>
  <!-- 菜单 -->
  <div class="menu-container" id="menuContainer">
    <button class="menu-btn" id="menuBtn" aria-label="菜单">
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    <div class="menu-dropdown" id="menuDropdown">
      <a href="./index.html" class="menu-item active">霖久充电登录</a>
      <a href="./ksck.html" class="menu-item">快手ck转换</a>
      <a href="./qiehuang.html" class="menu-item">茄皇登录</a>
      <div class="menu-divider"></div>
      <a href="javascript:location.reload()" class="menu-item">刷新页面</a>
    </div>
  </div>

  <div class="container">
    <!-- 登录界面 -->
    <div class="login-box" id="loginBox">
      <h2>内测授权登录</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="phone">手机号</label>
          <input type="tel" id="phone" placeholder="请输入手机号" maxlength="11" required />
          <div class="error-msg" id="phoneError">请输入正确的手机号</div>
        </div>

        <div class="form-group">
          <label for="code">验证码</label>
          <div class="code-group">
            <input type="text" id="code" placeholder="请输入验证码" maxlength="6" required />
            <button type="button" class="get-code-btn" id="getCodeBtn">
              获取验证码
            </button>
          </div>
          <div class="error-msg" id="codeError">请输入验证码</div>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">登录</button>
      </form>
    </div>

    <!-- 登录成功界面 -->
    <div class="success-box" id="successBox">
      <div class="success-icon"></div>
      <div class="success-text">登录成功</div>
      <div class="user-info" id="userInfo">
        <p><strong>手机号：</strong><span id="userPhone"></span></p>
        <p><strong>登录时间：</strong><span id="loginTime"></span></p>
      </div>

      <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>
  </div>
