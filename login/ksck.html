    <style>
        * {

            padding: 0;
            box-sizing: border-box;

        body {

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .section {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
            font-size: 14px;
        }

        textarea,
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Consolas', 'Monaco', monospace;
            transition: border-color 0.3s;
        }

        textarea:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 150px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-convert {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-convert:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-reverse {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-reverse:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .btn-clear {
            background: #6c757d;
            color: white;
        }

        .btn-clear:hover {
            background: #5a6268;
        }

        .btn-copy {
            background: #28a745;
            color: white;
        }

        .btn-copy:hover {
            background: #218838;
        }

        .info {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #2196F3;
        }

        .info h3 {
            color: #1976D2;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .info ul {
            margin-left: 20px;
            color: #555;
        }

        .info li {
            margin: 5px 0;
        }

        /* 菜单样式 */
        .menu-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            flex: none;
            min-width: auto;
            padding: 0;
        }

        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .menu-btn svg {
            display: block;
        }

        .menu-dropdown {
            position: absolute;
            top: 55px;
            left: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            width: 160px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            overflow: hidden;
        }

        .menu-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .menu-item {
            display: block;
            padding: 12px 20px;
            color: #555;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-item:hover {
            background: #f8f9fa;
            color: #667eea;
            border-left-color: #667eea;
        }

        .menu-item.active {
            background: #667eea;
            color: white;
            border-left-color: #764ba2;
            font-weight: 600;
        }

        .menu-item.active:hover {
            background: #5568d3;
            color: white;
        }

        .menu-divider {
            height: 1px;
            background: #eee;
            margin: 4px 0;
        }

    <div class="container">
        <h1>🍪 Cookie格式转换工具</h1>

        <div class="info">
            <h3>📌 使用说明</h3>
            <ul>
                <li>将Cookie格式转换为快手API参数格式</li>
                <li>Cookie字段必填，Salt和Kaw可选</li>
                <li>自动进行URL解码处理(如 %2C → ,)</li>
                <li>转换后的格式使用分号(;)分隔，无空格</li>
                <li>保持参数原始顺序，kaw和salt在最后</li>
            </ul>
        </div>

        <div class="section">
            <label for="input">Cookie字符串 <span style="color:red;">*</span>:</label>
            <textarea id="input" placeholder=""></textarea>
        </div>

        <div class="section">
            <label for="salt">Salt (可选，如Cookie中有则替换):</label>
            <input type="text" id="salt" placeholder="">
        </div>

        <div class="section">
            <label for="kaw">Kaw (可选，如Cookie中有则替换):</label>
            <input type="text" id="kaw" placeholder="">
        </div>

        <div class="button-group">
            <button class="btn-convert" onclick="convertCookieToParams()">🔄 转换</button>
            <button class="btn-copy" onclick="copyResult()">📋 复制结果</button>
            <button class="btn-clear" onclick="clearAll()">🗑️ 清空</button>
        </div>

        <div class="section">
            <div

                    <div>

                    </div>

                </div>
            </div>
            <label for="output">转换结果:</label>

        </div>
