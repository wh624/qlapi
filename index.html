<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小湫的网站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    .container {
      max-width: 900px;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeInDown 0.8s ease;
    }

    .header h1 {
      color: white;
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .header p {
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.1rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      animation: fadeInUp 0.8s ease 0.2s both;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .card:hover::before {
      transform: scaleX(1);
    }

    .card-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      transition: transform 0.3s ease;
    }

    .card:hover .card-icon {
      transform: scale(1.1) rotate(5deg);
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 10px;
    }

    .card-desc {
      color: #718096;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .card-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 20px;
    }

    .sub-link {
      padding: 8px 16px;
      background: #f7fafc;
      border-radius: 8px;
      color: #4a5568;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      display: inline-block;
    }

    .sub-link:hover {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      transform: translateX(5px);
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.9rem;
      animation: fadeIn 1s ease 0.4s both;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 2rem;
      }

      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>功能导航</h1>
      <p>选择您要访问的功能模块</p>
    </div>

    <div class="cards">
      <div class="card" onclick="window.location.href='./login/'">
        <div class="card-icon">🔐</div>
        <h2 class="card-title">登录相关</h2>
        <p class="card-desc">青龙面板登录页面及相关功能</p>
        <div class="card-links">
          <a href="./login/index.html" class="sub-link" onclick="event.stopPropagation()">主页面</a>
        </div>
      </div>

      <div class="card" onclick="window.location.href='./qlapi/'">
        <div class="card-icon">⚡</div>
        <h2 class="card-title">青龙 API</h2>
        <p class="card-desc">青龙面板 API 接口文档与调试</p>
        <div class="card-links">
          <a href="./qlapi/index.html" class="sub-link" onclick="event.stopPropagation()">API 文档</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
